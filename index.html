<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AFITNESS TRACKER - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.4);
            --primary-dark: #3a0000;
            --bg-top: #2a0000;
            --bg: #050505; 
            --card: #121212; 
            --text: #ffffff; 
            --dim: #888; 
            --success: #00ff88;
            --error: #ff4444;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at 50% -10%, var(--bg-top) 0%, #0a0000 40%, #050505 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px; padding-top: 30px;
            transition: background 0.4s ease;
            overflow-x: hidden;
        }

        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .header { 
            border-left: 5px solid var(--primary); 
            padding: 12px 20px; 
            margin-bottom: 35px; 
            background: linear-gradient(90deg, var(--primary-glow) 0%, transparent 100%);
            border-radius: 4px 15px 15px 4px;
        }
        .header span { 
            display: block;
            color: var(--primary); font-weight: 900; font-size: 22px; 
            text-shadow: 0 0 15px var(--primary-glow); 
            line-height: 1.2;
        }
        .header h1 { 
            font-size: 16px; margin: 5px 0 0 0; color: var(--dim); 
            letter-spacing: 3px; font-weight: 400;
            line-height: 1.2;
        }

        /* NAVIGATION DÉFILANTE (SCROLLBAR) */
        .nav { 
            display: flex; 
            overflow-x: auto; 
            gap: 12px; 
            margin-bottom: 35px; 
            padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE 10+ */
            scroll-snap-type: x mandatory;
        }
        .nav::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .nav-btn {
            flex: 0 0 140px; /* Largeur fixe pour chaque bouton */
            scroll-snap-align: start;
            border-radius: 14px; cursor: pointer; font-family: 'Oswald'; font-size: 11px; padding: 15px 10px;
            transition: 0.3s; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05);
            background: #0f0f0f; color: var(--dim);
            text-align: center;
        }

        /* ÉTATS ACTIFS PAR SÉANCE */
        .active-u1 { background: linear-gradient(145deg, #ff1f1f, #8b0000) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }
        .active-u2 { background: linear-gradient(145deg, #ffcc00, #b88600) !important; color: black !important; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }
        .active-l1 { background: linear-gradient(145deg, #ff8c00, #cc7000) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3); }
        .active-l2 { background: linear-gradient(145deg, #ff00ff, #b300b3) !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3); }

        .exo-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.03);
            padding: 25px; border-radius: 24px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.03), inset 0 0 15px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .exo-card:active { transform: scale(0.98); }

        .del-exo-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.05); color: var(--dim);
            border: none; width: 24px; height: 24px; border-radius: 50%;
            font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .status-badge { font-size: 9px; padding: 6px 14px; border-radius: 30px; font-weight: 800; margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .badge-success { border-color: var(--success) !important; color: var(--success) !important; }

        .modal { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, var(--primary-dark) 0%, #050505 100%); z-index: 1000; padding: 25px; overflow-y: auto; }

        .btn-qty { background: #1a1a1a; color: white; border: 1px solid #333; width: 45px; height: 45px; border-radius: 12px; font-size: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 24px; font-family: 'Oswald'; font-size: 18px; border-radius: 20px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <span id="brand-name">AFITNESS TRACKER</span>
        <h1 id="title">UPPER 1</h1>
    </div>

    <div class="nav">
        <button class="nav-btn" id="btnU1" onclick="load('U1')">UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">UPPER 2</button>
        <button class="nav-btn" id="btnL1" onclick="load('L1')">LOWER 1</button>
        <button class="nav-btn" id="btnL2" onclick="load('L2')">LOWER 2</button>
    </div>

    <div id="exo-list"></div>

    <div style="text-align: center; margin: 40px 0;">
        <button onclick="addExoPrompt()" style="background:none; border: 1px dashed #555; color:#888; padding:15px 40px; border-radius:15px; font-family:Oswald; cursor:pointer; width:100%;">+ AJOUTER UN EXERCICE</button>
    </div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 id="m-name" style="margin:0; font-size:28px;"></h2>
            <span onclick="closeM()" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;">✕</span>
        </div>
        <div class="record-banner" style="border-left: 4px solid var(--primary); background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
            <small style="color:var(--dim); font-size:10px; font-weight:bold;">DERNIÈRE PERFORMANCE</small>
            <div id="last-record-text" style="font-family:Oswald; font-size:24px; margin-top:5px;"></div>
        </div>
        <div class="input-section" style="background: rgba(0,0,0,0.6); padding: 25px; border-radius: 30px;">
            <input type="number" id="main-weight" style="width:100%; background:transparent; border:none; color:#fff; font-size:60px; font-family:Oswald; text-align:center; outline:none;" inputmode="decimal">
            <div style="text-align:center; color:var(--primary); font-family:Oswald; margin-bottom:30px; font-size:14px;">KILOGRAMMES</div>
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #444; color:#888; padding:18px; margin-top:20px; border-radius:15px; font-size:12px;">+ AJOUTER SÉRIE</button>
        </div>
        <button class="btn-save" onclick="saveSession()">ENREGISTRER LA SÉANCE</button>
        <div style="height: 250px; margin-top:40px; background:rgba(0,0,0,0.3); border-radius:25px; padding:20px;">
            <canvas id="chart"></canvas>
        </div>
        <h3 class="oswald" style="margin-top:40px; font-size:16px; color:var(--dim);">HISTORIQUE</h3>
        <div id="history-list" style="margin-top:15px; padding-bottom:50px;"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_VNext_Config')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Développé militaire barre", "Tirage horizontale", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"],
        'L1': ["Soulevé de terre", "Fente barre", "Presse à cuisse", "Leg curl"],
        'L2': ["Squat barre", "Fente barre", "Leg extension", "Presse unilatéral"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_VNext_Logs')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        const root = document.documentElement;
        
        // Reset classes
        ['btnU1', 'btnU2', 'btnL1', 'btnL2'].forEach(btnId => document.getElementById(btnId).className = 'nav-btn');

        if(id === 'U1') {
            root.style.setProperty('--primary', '#ff0000');
            root.style.setProperty('--primary-glow', 'rgba(255, 0, 0, 0.4)');
            root.style.setProperty('--bg-top', '#3a0000');
            document.getElementById('btnU1').className = 'nav-btn active-u1';
            document.getElementById('title').innerText = 'UPPER 1';
        } else if(id === 'U2') {
            root.style.setProperty('--primary', '#ffcc00');
            root.style.setProperty('--primary-glow', 'rgba(255, 204, 0, 0.3)');
            root.style.setProperty('--bg-top', '#332200');
            document.getElementById('btnU2').className = 'nav-btn active-u2';
            document.getElementById('title').innerText = 'UPPER 2';
        } else if(id === 'L1') {
            root.style.setProperty('--primary', '#ff8c00'); // Orange
            root.style.setProperty('--primary-glow', 'rgba(255, 140, 0, 0.3)');
            root.style.setProperty('--bg-top', '#3d2200');
            document.getElementById('btnL1').className = 'nav-btn active-l1';
            document.getElementById('title').innerText = 'LOWER 1';
        } else if(id === 'L2') {
            root.style.setProperty('--primary', '#ff00ff'); // Rose
            root.style.setProperty('--primary-glow', 'rgba(255, 0, 255, 0.3)');
            root.style.setProperty('--bg-top', '#3d003d');
            document.getElementById('btnL2').className = 'nav-btn active-l2';
            document.getElementById('title').innerText = 'LOWER 2';
        }

        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        config[id].forEach((name, index) => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            let badgeClass = "status-badge", badgeText = "CIBLE 10 REPS", badgeIcon = "";
            if(last && last.sets.every(r => r >= 10)) {
                badgeClass = "status-badge badge-success"; badgeText = "AUGMENTER CHARGE"; badgeIcon = "↑";
            }
            const card = document.createElement('div');
            card.className = 'exo-card';
            card.innerHTML = `
                <button class="del-exo-btn" onclick="deleteExo(${index}); event.stopPropagation();">✕</button>
                <div class="exo-info" onclick="openM('${name}')" style="width:100%">
                    <div class="oswald">${name}</div>
                    <div style="font-size:15px; color:var(--dim); font-weight:700;">${last ? last.weight+'KG • '+last.sets.join('/') : '--'}</div>
                    <span class="${badgeClass}">${badgeText} ${badgeIcon}</span>
                </div>
                <div onclick="openM('${name}')" style="width:48px; height:48px; border-radius:16px; background:var(--primary); display:flex; align-items:center; justify-content:center; color:white; font-size:22px;">+</div>
            `;
            list.appendChild(card);
        });
    }

    function addExoPrompt() {
        const name = prompt("Nom du nouvel exercice :");
        if(name && name.trim() !== "") {
            config[currentSessId].push(name.trim());
            saveConfig(); load(currentSessId);
        }
    }
    function deleteExo(index) {
        if(confirm("Supprimer cet exercice ?")) {
            config[currentSessId].splice(index, 1);
            saveConfig(); load(currentSessId);
        }
    }
    function saveConfig() { localStorage.setItem('Elite_VNext_Config', JSON.stringify(config)); }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        if(last) {
            document.getElementById('last-record-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-record-text').innerText = "AUCUNE DONNÉE";
            document.getElementById('main-weight').value = "";
            currentSets = [8, 8, 8];
        }
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:12px; border-radius:18px; margin-bottom:10px;">
                <span class="oswald" style="color:var(--dim); font-size:12px;">SÉRIE ${i+1}</span>
                <div style="display:flex; align-items:center; gap:12px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:26px; width:40px; text-align:center;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>`).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(8); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = { date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}), weight, sets: [...currentSets] };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
        renderChart(currentExo); renderHistory(currentExo); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();
        if(h.length === 0) return;
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [{
                    data: h.map(l => l.weight),
                    borderColor: rootStyle().getPropertyValue('--primary'), borderWidth: 4, tension: 0.35, pointBackgroundColor: '#fff',
                    datalabels: { color: '#fff', align: 'top', font:{family:'Oswald', size:11, weight:'bold'} }
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444' } } } }
        });
    }

    function rootStyle() { return getComputedStyle(document.documentElement); }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:18px; background:rgba(255,255,255,0.02); border-radius:18px; margin-bottom:10px;">
                <div>
                    <div class="oswald" style="color:var(--primary); font-size:18px;">${e.weight} KG <span style="color:var(--dim); font-size:12px; margin-left:10px;">${e.date}</span></div>
                    <div style="font-weight:700; font-size:14px;">${e.sets.join(' / ')} REPS</div>
                </div>
                <button onclick="deleteLog(${i})" style="background:none; border:none; color:var(--error); font-size:18px;">✕</button>
            </div>
        `).reverse().join('');
    }

    function deleteLog(index) {
        if(confirm("Supprimer cette séance ?")) {
            logs[currentExo].splice(index, 1);
            localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
            renderChart(currentExo); renderHistory(currentExo); load(currentSessId);
        }
    }

    load('U1');
</script>
</body>
</html>
