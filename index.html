<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE TRACKER - COMMAND MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --bg: #050505; --card: #111; --accent: #00ff88; --accent-glow: rgba(0, 255, 136, 0.3);
            --text: #fff; --dim: #555; --red: #ff3b3b; --reps-color: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-top: 40px; }
        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        .header { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 26px; text-shadow: 0 0 10px var(--accent-glow); }
        
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .nav-btn { background: #0f0f0f; border: 1px solid #222; color: var(--dim); padding: 15px; border-radius: 10px; cursor: pointer; font-family: 'Oswald'; }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .exo-card { background: var(--card); border: 1px solid #222; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .exo-info b { font-size: 17px; display: block; color: #fff; }
        .exo-info span { color: var(--dim); font-size: 11px; }

        .status-badge { font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: 900; margin-top: 8px; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-up { background: rgba(0, 255, 136, 0.15); color: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }
        .badge-stay { background: rgba(255, 255, 255, 0.05); color: #444; border: 1px solid #222; }

        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; padding: 20px; overflow-y: auto; }
        .last-perf-banner { background: rgba(255, 255, 255, 0.03); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .last-perf-banner small { display: block; font-size: 9px; color: var(--accent); font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .last-perf-banner div { font-family: 'Oswald'; font-size: 20px; color: #fff; }

        .input-box { background: #0c0c0c; border: 1px solid #222; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .weight-input { width: 100%; background: transparent; border: none; color: var(--accent); font-size: 48px; font-family: 'Oswald'; text-align: center; outline: none; }

        .set-row { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .btn-qty { background: #252525; color: white; border: none; width: 42px; height: 42px; border-radius: 10px; font-size: 22px; font-weight: bold; }
        
        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 20px; font-family: 'Oswald'; font-size: 18px; border-radius: 15px; font-weight: bold; margin-top: 15px; box-shadow: 0 5px 20px var(--accent-glow); }

        .chart-box { height: 280px; margin-top: 30px; background: #080808; border-radius: 20px; padding: 15px; border: 1px solid #111; }
        
        .history-row { display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding: 15px; border-radius: 10px; margin-top: 8px; border-left: 4px solid var(--accent); }
        .history-row .poids { font-family: 'Oswald'; color: var(--accent); font-size: 18px; }
        .history-row .reps { font-size: 13px; color: #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <span>BIOMETRICS ANALYZER</span>
        <h1 id="title">SESSION 1</h1>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="btnU1" onclick="load('U1')">UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">UPPER 2</button>
    </div>

    <div id="exo-list"></div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="m-name" class="oswald" style="font-size:22px; margin:0; color:var(--accent);"></h2>
            <span onclick="closeM()" style="color:var(--red); font-family:Oswald; font-weight:bold; cursor:pointer;">✕</span>
        </div>

        <div id="last-perf-display" class="last-perf-banner">
            <small>RECORD PRÉCÉDENT</small>
            <div id="last-val-text">-- kg | -- reps</div>
        </div>

        <div class="input-box">
            <label style="display:block; text-align:center; font-size:10px; color:var(--dim); margin-bottom:5px; font-weight:800;">CHARGE EN KG</label>
            <input type="number" id="main-weight" class="weight-input" inputmode="decimal">
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #333; color:#555; padding:10px; margin-top:15px; border-radius:8px; font-size:11px;">+ AJOUTER UNE SÉRIE</button>
        </div>

        <button class="btn-save" onclick="saveSession()">ENREGISTRER LA PERFORMANCE</button>
        
        <div class="chart-box"><canvas id="chart"></canvas></div>

        <div style="margin-top:40px;">
            <h3 class="oswald" style="font-size:14px; color:var(--dim); letter-spacing:1px; margin-bottom:15px;">JOURNAL D'ENTRAÎNEMENT</h3>
            <div id="history-list"></div>
        </div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_Config_V6')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_Logs_V6')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+id).classList.add('active');
        document.getElementById('title').innerText = id === 'U1' ? 'UPPER 1' : 'UPPER 2';
        
        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        config[id].forEach(name => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            
            // Logique de badge
            let badgeHtml = '<span class="status-badge badge-stay">VISER 10 REPS</span>';
            if(last) {
                const allDone = last.sets.every(r => r >= 10);
                if(allDone) badgeHtml = '<span class="status-badge badge-up">AUGMENTE TA CHARGE</span>';
            }

            const card = document.createElement('div');
            card.className = 'exo-card';
            card.onclick = () => openM(name);
            card.innerHTML = `
                <div class="exo-info">
                    <b class="oswald">${name}</b>
                    <span>${last ? last.weight+'kg • '+last.sets.join('/') : 'Données vierges'}</span><br>
                    ${badgeHtml}
                </div>
                <div style="background:var(--accent); width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold;">+</div>
            `;
            list.appendChild(card);
        });
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        
        if(last) {
            document.getElementById('last-val-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-val-text').innerText = "Nouvel exercice";
            document.getElementById('main-weight').value = "";
            currentSets = [10, 10, 10];
        }

        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div class="set-row">
                <span class="oswald" style="color:var(--dim); font-size:11px;">SET ${i+1}</span>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:24px; width:30px; text-align:center; color:white;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(10); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = { 
            date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}), 
            weight, 
            sets: [...currentSets],
            avgReps: parseFloat((currentSets.reduce((a,b)=>a+b,0) / currentSets.length).toFixed(1))
        };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_Logs_V6', JSON.stringify(logs));
        closeM(); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [
                    {
                        label: 'Poids (kg)',
                        data: h.map(l => l.weight),
                        borderColor: '#00ff88', borderWidth: 4, yAxisID: 'yWeight',
                        pointBackgroundColor: '#00ff88', pointRadius: 4, tension: 0.3,
                        datalabels: { color: '#00ff88', align: 'top', offset: 5, font: {family:'Oswald', weight:'bold', size:11}, formatter: (v)=>v+'kg' }
                    },
                    {
                        label: 'Reps (moy)',
                        data: h.map(l => l.avgReps),
                        borderColor: '#ffffff', borderWidth: 2, borderDash: [5, 5], yAxisID: 'yReps',
                        pointRadius: 3, pointBackgroundColor: '#ffffff', tension: 0.3,
                        datalabels: { color: '#ffffff', align: 'bottom', offset: 5, font: {size:9}, formatter: (v)=>v+' r' }
                    }
                ]
            },
            options: { 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    yWeight: { type: 'linear', position: 'left', grid:{color:'#111'}, ticks:{display:false} },
                    yReps: { type: 'linear', position: 'right', grid:{display:false}, ticks:{display:false} }
                }
            }
        });
    }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div class="history-row">
                <div><div class="poids">${e.weight} KG</div></div>
                <div class="reps">${e.sets.join(' / ')}</div>
                <div style="color:var(--red); font-size:12px; padding:5px;" onclick="deleteEntry('${name}',${i})">✕</div>
            </div>
        `).reverse().join('');
    }

    function deleteEntry(name, i) { if(confirm("Supprimer cette séance ?")) { logs[name].splice(i, 1); localStorage.setItem('Elite_Logs_V6', JSON.stringify(logs)); renderHistory(name); renderChart(name); load(currentSessId); } }
    load('U1');
</script>
</body>
</html>
