<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE TRACKER - DYNAMIC COLORS</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --bg: #050505; --card: #111; --accent: #00ff88; --accent-glow: rgba(0, 255, 136, 0.3);
            --text: #fff; --dim: #555; --red: #ff3b3b; --orange: #ff9500; --blue-pink: #ff00ff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-top: 40px; }
        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        .header { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 26px; text-shadow: 0 0 10px var(--accent-glow); }
        
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .nav-btn { background: #0f0f0f; border: 1px solid #222; color: var(--dim); padding: 15px; border-radius: 10px; cursor: pointer; font-family: 'Oswald'; }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .exo-card { background: var(--card); border: 1px solid #222; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .exo-info b { font-size: 17px; display: block; color: #fff; }
        .status-badge { font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: 900; margin-top: 8px; display: inline-block; text-transform: uppercase; }
        .badge-up { background: rgba(0, 255, 136, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        .badge-stay { background: rgba(255, 255, 255, 0.05); color: #444; border: 1px solid #222; }

        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; padding: 20px; overflow-y: auto; }
        
        /* Journal des charges de la semaine passée */
        .record-banner { background: #0f1a14; border: 1px solid #1a3326; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .record-banner small { display: block; font-size: 9px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .record-banner div { font-family: 'Oswald'; font-size: 22px; color: #fff; }

        .input-box { background: #0c0c0c; border: 1px solid #222; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .weight-input { width: 100%; background: transparent; border: none; color: var(--accent); font-size: 48px; font-family: 'Oswald'; text-align: center; outline: none; }

        .set-row { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .btn-qty { background: #252525; color: white; border: none; width: 42px; height: 42px; border-radius: 10px; font-size: 22px; }
        
        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 20px; font-family: 'Oswald'; font-size: 18px; border-radius: 15px; font-weight: bold; margin-top: 15px; }

        .chart-box { height: 300px; margin-top: 30px; background: #080808; border-radius: 20px; padding: 15px; border: 1px solid #111; }
        .history-row { display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding: 15px; border-radius: 10px; margin-top: 8px; border: 1px solid #111; }
    </style>
</head>
<body>

    <div class="header">
        <span>BIOMETRICS ANALYZER</span>
        <h1 id="title">UPPER 1</h1>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="btnU1" onclick="load('U1')">SESSION 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">SESSION 2</button>
    </div>

    <div id="exo-list"></div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="m-name" class="oswald" style="font-size:22px; margin:0; color:var(--accent);"></h2>
            <span onclick="closeM()" style="color:var(--red); font-family:Oswald; font-weight:bold; cursor:pointer;">✕</span>
        </div>

        <div class="record-banner">
            <small>JOURNAL SEMAINE PASSÉE (RECORD À BATTRE)</small>
            <div id="last-record-text">-- kg | -- reps</div>
        </div>

        <div class="input-box">
            <label style="display:block; text-align:center; font-size:10px; color:var(--dim); margin-bottom:5px;">CHARGE EN KG</label>
            <input type="number" id="main-weight" class="weight-input" inputmode="decimal">
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #333; color:#555; padding:10px; margin-top:15px; border-radius:8px; font-size:11px;">+ AJOUTER UNE SÉRIE</button>
        </div>

        <button class="btn-save" onclick="saveSession()">VALIDER LA SÉANCE</button>
        
        <div class="chart-box"><canvas id="chart"></canvas></div>

        <div style="margin-top:40px;">
            <h3 class="oswald" style="font-size:14px; color:var(--dim); margin-bottom:15px;">HISTORIQUE COMPLET</h3>
            <div id="history-list"></div>
        </div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_Config_V7')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_Logs_V7')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+id).classList.add('active');
        document.getElementById('title').innerText = id === 'U1' ? 'UPPER 1' : 'UPPER 2';
        
        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        config[id].forEach(name => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            let badgeHtml = '<span class="status-badge badge-stay">VISER 10 REPS</span>';
            if(last && last.sets.every(r => r >= 10)) badgeHtml = '<span class="status-badge badge-up">AUGMENTE TA CHARGE</span>';

            const card = document.createElement('div');
            card.className = 'exo-card';
            card.onclick = () => openM(name);
            card.innerHTML = `
                <div class="exo-info">
                    <b class="oswald">${name}</b>
                    <span>${last ? last.weight+'kg • '+last.sets.join('/') : 'Vierge'}</span><br>
                    ${badgeHtml}
                </div>
                <div style="color:var(--accent); font-weight:bold;">➔</div>
            `;
            list.appendChild(card);
        });
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        
        if(last) {
            document.getElementById('last-record-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-record-text').innerText = "Aucun record";
            document.getElementById('main-weight').value = "";
            currentSets = [10, 10, 10];
        }

        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div class="set-row">
                <span class="oswald" style="color:var(--dim); font-size:11px;">SÉRIE ${i+1}</span>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:24px; width:30px; text-align:center;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(10); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = { 
            date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}), 
            weight, 
            sets: [...currentSets],
            avgReps: parseFloat((currentSets.reduce((a,b)=>a+b,0) / currentSets.length).toFixed(1))
        };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_Logs_V7', JSON.stringify(logs));
        closeM(); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();

        // Calcul des couleurs dynamiques
        const weightColors = h.map((e, i) => {
            if (i === 0) return '#ffffff';
            if (e.weight > h[i-1].weight) return '#00ff88'; // Vert
            if (e.weight < h[i-1].weight) return '#ff3b3b'; // Rouge
            return '#ffffff'; // Blanc neutre
        });

        const repsColors = h.map((e, i) => {
            if (i === 0) return '#ffffff';
            if (e.avgReps > h[i-1].avgReps) return '#ff00ff'; // Bleu-Rose (Magenta)
            if (e.avgReps < h[i-1].avgReps) return '#ff9500'; // Orange
            return '#ffffff'; // Blanc neutre
        });

        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [
                    {
                        label: 'Poids',
                        data: h.map(l => l.weight),
                        borderColor: '#555', borderWidth: 2,
                        segment: { borderColor: ctx => weightColors[ctx.p1DataIndex] },
                        pointBackgroundColor: weightColors,
                        pointRadius: 5, yAxisID: 'yW',
                        datalabels: { color: weightColors, align: 'top', formatter: (v)=>v+'kg' }
                    },
                    {
                        label: 'Reps',
                        data: h.map(l => l.avgReps),
                        borderColor: '#333', borderDash: [3, 3],
                        segment: { borderColor: ctx => repsColors[ctx.p1DataIndex] },
                        pointBackgroundColor: repsColors,
                        pointRadius: 4, yAxisID: 'yR',
                        datalabels: { color: repsColors, align: 'bottom', formatter: (v)=>v+'r' }
                    }
                ]
            },
            options: { 
                maintainAspectRatio: false, plugins: { legend: { display: false } },
                scales: { 
                    yW: { type: 'linear', position: 'left', display: false },
                    yR: { type: 'linear', position: 'right', display: false }
                }
            }
        });
    }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div class="history-row">
                <div class="oswald" style="color:var(--accent); font-size:18px;">${e.weight} KG</div>
                <div style="font-weight:bold;">${e.sets.join(' / ')}</div>
                <div style="color:var(--red); font-size:10px;" onclick="deleteEntry('${name}',${i})">SUPPR</div>
            </div>
        `).reverse().join('');
    }

    function deleteEntry(name, i) { if(confirm("Supprimer ?")) { logs[name].splice(i, 1); localStorage.setItem('Elite_Logs_V7', JSON.stringify(logs)); renderHistory(name); renderChart(name); load(currentSessId); } }
    load('U1');
</script>
</body>
</html>
