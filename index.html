<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AFITNESS TRACKER - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.4);
            --primary-dark: #3a0000;
            --bg-top: #2a0000;
            --bg: #050505; 
            --card: rgba(18, 18, 18, 0.8); 
            --text: #ffffff; 
            --dim: #888; 
            --success: #00ff88;
            --error: #ff4444;
            --inner-glow: inset 0 1px 2px rgba(255,255,255,0.1);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at 50% -10%, var(--bg-top) 0%, #0a0000 40%, #050505 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px; padding-top: 40px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .header { 
            border-left: 6px solid var(--primary); 
            padding: 12px 20px; margin-bottom: 40px; 
            background: linear-gradient(90deg, var(--primary-glow) 0%, transparent 100%);
            border-radius: 4px 15px 15px 4px;
            box-shadow: -15px 0 30px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            transform: translate3d(0,0,0);
        }
        .header span { 
            color: var(--primary); font-weight: 900; font-size: 26px; 
            letter-spacing: -1px; text-shadow: 0 0 15px var(--primary-glow);
        }
        .header h1 { font-size: 13px; margin: 5px 0 0 0; color: var(--dim); letter-spacing: 4px; }

        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 35px; }
        .nav-btn {
            border-radius: 14px; cursor: pointer; font-family: 'Oswald'; font-size: 13px; padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05);
            background: #0f0f0f; color: var(--dim);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), var(--inner-glow);
            transform: translate3d(0,0,0);
        }

        .active-u1 {
            background: linear-gradient(145deg, #ff1f1f, #8b0000) !important;
            color: white !important; border: none !important;
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.35), var(--inner-glow) !important;
            transform: translate3d(0, -4px, 0) scale(1.02);
        }

        .active-u2 {
            background: linear-gradient(145deg, #ffcc00, #b88600) !important;
            color: black !important; border: none !important;
            box-shadow: 0 15px 35px rgba(255, 204, 0, 0.3), var(--inner-glow) !important;
            transform: translate3d(0, -4px, 0) scale(1.02);
        }

        .exo-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.04);
            padding: 25px; border-radius: 24px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            transition: transform 0.2s ease; transform: translate3d(0,0,0);
        }
        .exo-card:active { transform: scale(0.96) translate3d(0,0,0); }

        .status-badge { 
            font-size: 9px; padding: 6px 14px; border-radius: 30px; font-weight: 800; 
            margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid rgba(255,255,255,0.1); color: var(--dim);
            background: rgba(255,255,255,0.02);
        }

        .badge-success {
            border-color: var(--success) !important;
            color: var(--success) !important;
            background: rgba(0, 255, 136, 0.05) !important;
        }

        .add-btn-icon {
            width: 48px; height: 48px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            background: var(--primary); color: white; font-weight: bold; font-size: 22px;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .modal { 
            display: none; position: fixed; inset: 0; 
            background: radial-gradient(circle at center, var(--primary-dark) 0%, #050505 100%); 
            z-index: 1000; padding: 25px; overflow-y: auto;
        }

        /* STYLE BOUTON SUPPRIMER SÉRIE */
        .btn-delete-set {
            background: rgba(255, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(255, 68, 68, 0.2);
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-delete-set:active { transform: scale(0.9); background: var(--error); color: white; }

        .btn-save {
            background: var(--primary); color: white; border: none; width: 100%; padding: 24px;
            font-family: 'Oswald'; font-size: 18px; border-radius: 20px; font-weight: bold; margin-top: 30px;
            box-shadow: 0 15px 40px var(--primary-glow); text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-qty { 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            width: 45px; height: 45px; border-radius: 12px; font-size: 20px; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span id="brand-name">AFITNESS TRACKER</span>
            <h1 id="title">SESSION 1</h1>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active-u1" id="btnU1" onclick="load('U1')">SESSION UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">SESSION UPPER 2</button>
    </div>

    <div id="exo-list"></div>

    <div style="text-align: center; margin: 50px 0;">
        <button onclick="addExo()" style="background:none; border: 1px dashed #444; color:#666; padding:18px 30px; border-radius:12px; font-family:Oswald; cursor:pointer;">+ AJOUTER EXERCICE</button>
    </div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 id="m-name" style="margin:0; font-size:28px;"></h2>
            <span onclick="closeM()" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold;">✕</span>
        </div>

        <div class="record-banner" style="border-left: 4px solid var(--primary); background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
            <small style="color:var(--dim); font-size:10px; font-weight:bold;">DERNIÈRE PERFORMANCE</small>
            <div id="last-record-text" style="font-family:Oswald; font-size:24px; margin-top:5px;"></div>
        </div>

        <div class="input-section" style="background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 30px; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);">
            <input type="number" id="main-weight" class="weight-input" style="width:100%; background:transparent; border:none; color:#fff; font-size:60px; font-family:Oswald; text-align:center; outline:none;" inputmode="decimal">
            <div style="text-align:center; color:var(--primary); font-family:Oswald; margin-bottom:30px; font-size:14px; letter-spacing:3px;">KILOGRAMMES</div>
            
            <div id="sets-container"></div>
            
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #444; color:#888; padding:18px; margin-top:20px; border-radius:15px; font-family: Montserrat; font-size:12px;">+ AJOUTER SÉRIE</button>
        </div>

        <button class="btn-save" id="save-btn-modal" onclick="saveSession()">ENREGISTRER</button>
       
        <div style="height: 280px; margin-top:40px; background:rgba(0,0,0,0.3); border-radius:25px; padding:20px;">
            <canvas id="chart"></canvas>
        </div>
        <div id="history-list" style="margin-top:30px;"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_VNext_Config')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_VNext_Logs')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        const root = document.documentElement;
        const brand = document.getElementById('brand-name');

        if(id === 'U1') {
            root.style.setProperty('--primary', '#ff0000');
            root.style.setProperty('--primary-glow', 'rgba(255, 0, 0, 0.4)');
            root.style.setProperty('--primary-dark', '#2a0000');
            root.style.setProperty('--bg-top', '#3a0000');
            document.getElementById('btnU1').className = 'nav-btn active-u1';
            document.getElementById('btnU2').className = 'nav-btn';
            brand.style.color = '#ff0000';
        } else {
            root.style.setProperty('--primary', '#ffcc00');
            root.style.setProperty('--primary-glow', 'rgba(255, 204, 0, 0.3)');
            root.style.setProperty('--primary-dark', '#221a00');
            root.style.setProperty('--bg-top', '#332200');
            document.getElementById('btnU2').className = 'nav-btn active-u2';
            document.getElementById('btnU1').className = 'nav-btn';
            brand.style.color = '#ffcc00';
        }

        document.getElementById('title').innerText = id === 'U1' ? 'UPPER 1' : 'UPPER 2';
        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        
        config[id].forEach(name => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            let badgeClass = "status-badge", badgeText = "CIBLE 10 REPS", badgeIcon = "";

            if(last && last.sets.every(r => r >= 10)) {
                badgeClass = "status-badge badge-success";
                badgeText = "AUGMENTER CHARGE";
                badgeIcon = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
            }

            const card = document.createElement('div');
            card.className = 'exo-card';
            card.onclick = () => openM(name);
            card.innerHTML = `
                <div class="exo-info">
                    <div class="oswald">${name}</div>
                    <div style="font-size:15px; color:var(--dim); font-weight:700;">${last ? last.weight+'KG • '+last.sets.join('/') : '--'}</div>
                    <span class="${badgeClass}">${badgeText} ${badgeIcon}</span>
                </div>
                <div class="add-btn-icon" style="color:${id === 'U1' ? 'white' : 'black'}">+</div>
            `;
            list.appendChild(card);
        });
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        if(last) {
            document.getElementById('last-record-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-record-text').innerText = "AUCUNE DONNÉE";
            document.getElementById('main-weight').value = "";
            currentSets = [8, 8, 8];
        }
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:18px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.02);">
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-delete-set" onclick="removeSet(${i})">✕</button>
                    <span class="oswald" style="color:var(--dim); font-size:12px;">SÉRIE ${i+1}</span>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:26px; width:40px; text-align:center;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>
        `).join('');
    }

    // NOUVELLE FONCTION DE SUPPRESSION
    function removeSet(index) {
        if(currentSets.length > 1) { // On garde au moins une série
            currentSets.splice(index, 1);
            refreshSetsUI();
        }
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(8); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = {
            date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}),
            weight, sets: [...currentSets]
        };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
        closeM(); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();
        if(h.length === 0) return;
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [{
                    data: h.map(l => l.weight),
                    borderColor: '#ff0000',
                    borderWidth: 4, tension: 0.35, pointBackgroundColor: '#fff',
                    datalabels: { color: '#fff', align: 'top', font:{family:'Oswald', size:11, weight:'bold'} }
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444' } } } }
        });
    }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div style="display:flex; justify-content:space-between; padding:20px; background:rgba(255,255,255,0.02); border-radius:18px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.02);">
                <span class="oswald" style="color:var(--primary)">${e.weight} KG</span>
                <span style="font-weight:700;">${e.sets.join(' / ')}</span>
            </div>
        `).reverse().join('');
    }

    function addExo() {
        const n = prompt("Nom de l'exercice :");
        if(n) { config[currentSessId].push(n); localStorage.setItem('Elite_VNext_Config', JSON.stringify(config)); load(currentSessId); }
    }

    load('U1');
</script>
</body>
</html>
