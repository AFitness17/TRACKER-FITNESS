<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AFITNESS TRACKER - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: rgba(255, 0, 0, 0.4);
            --primary-dark: #3a0000;
            --bg-top: #2a0000;
            --bg: #050505; 
            --card: #121212; 
            --text: #ffffff; 
            --dim: #888; 
            --success: #00ff88;
            --error: #ff4444;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at 50% -10%, var(--bg-top) 0%, #0a0000 40%, #050505 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px; padding-top: 30px;
            transition: background 0.4s ease;
            overflow-x: hidden;
        }

        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .header { 
            border-left: 5px solid var(--primary); 
            padding: 12px 20px; 
            margin-bottom: 35px; 
            background: linear-gradient(90deg, var(--primary-glow) 0%, transparent 100%);
            border-radius: 4px 15px 15px 4px;
        }
        .header span { display: block; color: var(--primary); font-weight: 900; font-size: 22px; text-shadow: 0 0 15px var(--primary-glow); line-height: 1.2; }
        .header h1 { font-size: 16px; margin: 5px 0 0 0; color: var(--dim); letter-spacing: 3px; font-weight: 400; }

        .nav { 
            display: flex; 
            overflow-x: auto; 
            gap: 12px; 
            margin-bottom: 35px; 
            padding: 10px 5px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }
        .nav::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 0 0 130px;
            scroll-snap-align: center;
            border-radius: 14px; cursor: pointer; font-family: 'Oswald'; font-size: 11px; padding: 15px 5px;
            transition: 0.3s; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05);
            background: #0f0f0f; color: var(--dim);
            text-align: center;
        }

        .active-u1 { background: linear-gradient(145deg, #ff1f1f, #8b0000) !important; color: white !important; box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }
        .active-u2 { background: linear-gradient(145deg, #ffcc00, #b88600) !important; color: black !important; box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }
        .active-l1 { background: linear-gradient(145deg, #ff8c00, #cc7000) !important; color: white !important; box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3); }
        .active-l2 { background: linear-gradient(145deg, #ff00ff, #b300b3) !important; color: white !important; box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3); }

        .exo-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.03);
            padding: 25px; border-radius: 24px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .del-exo-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 10px; z-index: 5; }
        .status-badge { font-size: 9px; padding: 6px 14px; border-radius: 30px; font-weight: 800; margin-top: 10px; display: inline-flex; border: 1px solid rgba(255,255,255,0.1); }
        .badge-success { border-color: var(--success) !important; color: var(--success) !important; }

        .modal { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, var(--primary-dark) 0%, #050505 100%); z-index: 1000; padding: 25px; overflow-y: auto; }
        .btn-qty { background: #1a1a1a; color: white; border: 1px solid #333; width: 45px; height: 45px; border-radius: 12px; font-size: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 24px; font-family: 'Oswald'; font-size: 18px; border-radius: 20px; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <span>AFITNESS TRACKER</span>
        <h1 id="title">UPPER 1</h1>
    </div>

    <div class="nav">
        <button class="nav-btn" id="btnU1" onclick="load('U1')">UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">UPPER 2</button>
        <button class="nav-btn" id="btnL1" onclick="load('L1')">LOWER 1</button>
        <button class="nav-btn" id="btnL2" onclick="load('L2')">LOWER 2</button>
    </div>

    <div id="exo-list"></div>

    <div style="text-align: center; margin: 40px 0;">
        <button onclick="addExoPrompt()" style="background:none; border: 1px dashed #555; color:#888; padding:15px 40px; border-radius:15px; font-family:Oswald; cursor:pointer; width:100%;">+ AJOUTER UN EXERCICE</button>
    </div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 id="m-name" style="margin:0; font-size:28px;"></h2>
            <span onclick="closeM()" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;">✕</span>
        </div>
        <div id="record-banner" style="border-left: 4px solid var(--primary); background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
            <small style="color:var(--dim); font-size:10px; font-weight:bold;">DERNIÈRE PERFORMANCE</small>
            <div id="last-record-text" style="font-family:Oswald; font-size:24px; margin-top:5px;"></div>
        </div>
        <div class="input-section" style="background: rgba(0,0,0,0.6); padding: 25px; border-radius: 30px;">
            <input type="number" id="main-weight" style="width:100%; background:transparent; border:none; color:#fff; font-size:60px; font-family:Oswald; text-align:center; outline:none;" inputmode="decimal" placeholder="0">
            <div style="text-align:center; color:var(--primary); font-family:Oswald; margin-bottom:30px; font-size:14px;">KILOGRAMMES</div>
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #444; color:#888; padding:18px; margin-top:20px; border-radius:15px; font-size:12px;">+ AJOUTER SÉRIE</button>
        </div>
        <button class="btn-save" onclick="saveSession()">ENREGISTRER LA SÉANCE</button>
    </div>

<script>
    // LISTE OFFICIELLE DEMANDÉE
    const officialExos = {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Développé militaire barre", "Tirage horizontale", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"],
        'L1': ["Soulevé de terre", "Fente barre", "Presse", "Leg curl"],
        'L2': ["Squat barre", "Fente barre", "Leg extension", "Presse unilatéral"]
    };

    // RÉCUPÉRATION ET SYNCHRONISATION FORCÉE
    let config = JSON.parse(localStorage.getItem('Elite_VNext_Config')) || officialExos;

    // On force les exos demandés s'ils ne sont pas là
    ['L1', 'L2'].forEach(session => {
        if (!config[session] || config[session].length === 0) {
            config[session] = [...officialExos[session]];
        }
    });

    localStorage.setItem('Elite_VNext_Config', JSON.stringify(config));

    let logs = JSON.parse(localStorage.getItem('Elite_VNext_Logs')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1';

    function load(id) {
        currentSessId = id;
        const root = document.documentElement;
        ['btnU1', 'btnU2', 'btnL1', 'btnL2'].forEach(b => document.getElementById(b).className = 'nav-btn');

        if(id === 'U1') {
            root.style.setProperty('--primary', '#ff0000');
            root.style.setProperty('--primary-dark', '#3a0000');
            document.getElementById('btnU1').className = 'nav-btn active-u1';
            document.getElementById('title').innerText = 'UPPER 1';
        } else if(id === 'U2') {
            root.style.setProperty('--primary', '#ffcc00');
            root.style.setProperty('--primary-dark', '#221a00');
            document.getElementById('btnU2').className = 'nav-btn active-u2';
            document.getElementById('title').innerText = 'UPPER 2';
        } else if(id === 'L1') {
            root.style.setProperty('--primary', '#ff8c00');
            root.style.setProperty('--primary-dark', '#3d2200');
            document.getElementById('btnL1').className = 'nav-btn active-l1';
            document.getElementById('title').innerText = 'LOWER 1';
        } else if(id === 'L2') {
            root.style.setProperty('--primary', '#ff00ff');
            root.style.setProperty('--primary-dark', '#3d003d');
            document.getElementById('btnL2').className = 'nav-btn active-l2';
            document.getElementById('title').innerText = 'LOWER 2';
        }

        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        
        config[id].forEach((name, index) => {
            const h = logs[name] || []; const last = h[h.length-1];
            let badgeText = (last && last.sets.every(r => r >= 10)) ? "AUGMENTER CHARGE ↑" : "CIBLE 10 REPS";
            let badgeClass = (last && last.sets.every(r => r >= 10)) ? "status-badge badge-success" : "status-badge";
            
            const card = document.createElement('div');
            card.className = 'exo-card';
            card.innerHTML = `
                <button class="del-exo-btn" onclick="event.stopPropagation(); deleteExo(${index});">✕</button>
                <div onclick="openM('${name}')" style="width:100%">
                    <div class="oswald">${name}</div>
                    <div style="font-size:15px; color:var(--dim); font-weight:700;">${last ? last.weight+'KG • '+last.sets.join('/') : '--'}</div>
                    <span class="${badgeClass}">${badgeText}</span>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function addExoPrompt() {
        let n = prompt("Nom de l'exercice :");
        if(n && n.trim() !== "") { 
            config[currentSessId].push(n.trim()); 
            localStorage.setItem('Elite_VNext_Config', JSON.stringify(config)); 
            load(currentSessId); 
        }
    }

    function deleteExo(i) {
        if(confirm("Supprimer cet exercice ?")) { 
            config[currentSessId].splice(i, 1); 
            localStorage.setItem('Elite_VNext_Config', JSON.stringify(config)); 
            load(currentSessId); 
        }
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || []; const last = h[h.length-1];
        document.getElementById('m-name').innerText = name;
        document.getElementById('last-record-text').innerText = last ? `${last.weight} kg | ${last.sets.join('/')}` : "AUCUNE DONNÉE";
        document.getElementById('main-weight').value = last ? last.weight : "";
        currentSets = last ? [...last.sets] : [8,8,8];
        document.getElementById('modal').style.display = 'block';
        refreshSetsUI();
    }

    function refreshSetsUI() {
        document.getElementById('sets-container').innerHTML = currentSets.map((r, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:10px; border-radius:15px; margin-bottom:8px;">
                <span class="oswald" style="color:var(--dim); font-size:12px;">SÉRIE ${i+1}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:22px; width:30px; text-align:center;">${r}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>`).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(8); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const w = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(w)) return;
        const entry = { weight: w, sets: [...currentSets] };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
        load(currentSessId); closeM();
    }

    load('U1');
</script>
</body>
</html>
