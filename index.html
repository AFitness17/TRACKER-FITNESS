<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE TRACKER - NEXT GEN DYNAMIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg: #050505; 
            --card: #111111; 
            --accent: #ff0000; 
            --accent-dark: #4a0000;
            --gold: #ffcc00;
            --gradient-red: linear-gradient(145deg, #ff1f1f 0%, #8b0000 100%);
            --gradient-gold: linear-gradient(145deg, #ffcc00 0%, #b88600 100%);
            --text: #ffffff; 
            --dim: #888; 
            --green: #00ff88; 
            --red: #ff3b3b;
            --orange: #ff9500; 
            --magenta: #ff00ff; 
            --glass: rgba(255, 255, 255, 0.03);
            --inner-glow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
       
        body {
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% -10%, #3a0000 0%, #150000 40%, #050505 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding: 20px; padding-top: 40px;
        }

        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        /* Header avec profondeur accentuée */
        .header { 
            border-left: 5px solid var(--accent); 
            padding: 15px; 
            margin-bottom: 30px; 
            background: linear-gradient(90deg, rgba(255,0,0,0.08) 0%, transparent 100%);
            border-radius: 0 12px 12px 0;
            box-shadow: -10px 0 20px rgba(255,0,0,0.1);
        }
        .header h1 { font-size: 32px; text-shadow: 0 0 20px rgba(255, 0, 0, 0.4); margin: 0; }
        .header span { color: var(--accent); font-size: 11px; font-weight: 800; }

        /* Navigation Différenciée */
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        
        .nav-btn {
            border-radius: 12px; cursor: pointer; font-family: 'Oswald'; font-size: 14px; padding: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            box-shadow: var(--inner-glow);
        }

        /* Style spécifique Upper 1 (Rouge) */
        #btnU1 { background: #0f0f0f; border: 1px solid #300; color: #ff4d4d; }
        #btnU1.active {
            background: var(--gradient-red); color: white; border: none;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3), var(--inner-glow);
            transform: translateY(-3px);
        }

        /* Style spécifique Upper 2 (Jaune/Noir) */
        #btnU2 { background: #0f0f0f; border: 1px solid #332200; color: var(--gold); }
        #btnU2.active {
            background: var(--gradient-gold); color: #000; border: none;
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.25), var(--inner-glow);
            transform: translateY(-3px);
        }

        /* Cards Premium */
        .exo-card {
            background: rgba(20, 20, 20, 0.7); border: 1px solid rgba(255,255,255,0.06);
            padding: 22px; border-radius: 20px; margin-bottom: 18px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), var(--inner-glow);
            transition: transform 0.2s;
        }
        .exo-card:active { transform: scale(0.97); }

        /* IA Pulse Animation */
        .status-badge { 
            font-size: 10px; padding: 5px 12px; border-radius: 20px; font-weight: 900; 
            margin-top: 8px; display: inline-block; text-transform: uppercase; 
            animation: pulseIA 2.5s infinite;
        }
        @keyframes pulseIA {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.3); }
            70% { box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .badge-up { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); }
        .badge-stay { background: rgba(255, 255, 255, 0.05); color: var(--dim); border: 1px solid #333; animation: none; }

        /* Modale High-Tech */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a0505 0%, #050505 100%); 
            z-index: 1000; padding: 25px; overflow-y: auto; 
        }
       
        .record-banner {
            background: rgba(255,255,255,0.02); border: 1px solid #222; border-left: 4px solid var(--accent);
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
            box-shadow: var(--inner-glow);
        }
        .record-banner small { color: var(--dim); font-size: 9px; font-weight: 800; display: block; margin-bottom: 4px; }
        .record-banner div { font-family: 'Oswald'; font-size: 22px; color: #fff; }

        .input-section {
            background: #0a0a0a; border: 1px solid #222; padding: 25px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,0,0,0.03);
        }
        .weight-input {
            width: 100%; background: transparent; border: none; color: #fff; font-size: 52px;
            font-family: 'Oswald'; text-align: center; outline: none; margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .set-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .btn-qty { background: #1a1a1a; color: white; border: 1px solid #333; width: 48px; height: 48px; border-radius: 14px; font-size: 22px; box-shadow: var(--inner-glow); }
        
        .btn-save {
            background: var(--gradient-red); color: white; border: none; width: 100%; padding: 22px;
            font-family: 'Oswald'; font-size: 20px; border-radius: 16px; font-weight: bold; margin-top: 25px;
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
        }

        .chart-box { height: 280px; margin-top: 30px; border-radius: 20px; background: rgba(0,0,0,0.4); padding: 15px; border: 1px solid #1a1a1a; }
        .history-row { display: flex; justify-content: space-between; padding: 18px; background: var(--glass); border-radius: 14px; margin-bottom: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.02); }
       
        .btn-admin { background: rgba(255,255,255,0.04); border: 1px solid #333; color: var(--dim); padding: 12px 24px; border-radius: 10px; font-family: 'Oswald'; font-size: 11px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span>ELITE PERFORMANCE ENGINE</span>
            <h1 id="title">SESSION 1</h1>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="btnU1" onclick="load('U1')">SESSION UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">SESSION UPPER 2</button>
    </div>

    <div id="exo-list"></div>

    <div style="text-align: center; margin: 40px 0;">
        <button class="btn-admin" onclick="addExo()">+ AJOUTER UN EXERCICE</button>
    </div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 id="m-name" style="margin:0; font-size:26px;"></h2>
                <span onclick="renameExo()" style="color:var(--dim); font-size:12px; text-decoration:underline; cursor:pointer;">Edit</span>
            </div>
            <span onclick="closeM()" style="background:#222; padding:12px 18px; border-radius:14px; color:var(--accent); font-weight:bold; cursor:pointer; box-shadow: var(--inner-glow);">✕</span>
        </div>

        <div class="record-banner">
            <small>ANALYSE PRÉCÉDENTE</small>
            <div id="last-record-text">-- kg | -- reps</div>
        </div>

        <div class="input-section">
            <input type="number" id="main-weight" class="weight-input" inputmode="decimal">
            <div style="text-align:center; color:var(--accent); font-family:Oswald; margin-bottom:20px; font-size:14px; letter-spacing:2px;">KILOGRAMMES</div>
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #444; color:#888; padding:15px; margin-top:15px; border-radius:14px; font-size:12px;">+ AJOUTER UNE SÉRIE</button>
        </div>

        <button class="btn-save" onclick="saveSession()">ENREGISTRER LA PERFORMANCE</button>
       
        <div class="chart-box"><canvas id="chart"></canvas></div>
        <div id="history-list" style="margin-top:30px;"></div>

        <div style="text-align:center; margin-top:40px; margin-bottom:40px;">
            <button class="btn-admin" style="color:var(--red); border-color:rgba(255,0,0,0.2);" onclick="deleteExo()">SUPPRIMER L'EXERCICE</button>
        </div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_VNext_Config')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_VNext_Logs')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+id).classList.add('active');
        document.getElementById('title').innerText = id === 'U1' ? 'UPPER 1' : 'UPPER 2';
       
        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        config[id].forEach(name => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            let statusHtml = '<span class="status-badge badge-stay">VISER 10 REPS</span>';
            if(last && last.sets.every(r => r >= 10)) statusHtml = '<span class="status-badge badge-up">AUGMENTE TA CHARGE</span>';

            const card = document.createElement('div');
            card.className = 'exo-card';
            card.onclick = () => openM(name);
            card.innerHTML = `
                <div>
                    <div class="oswald" style="font-size:19px; letter-spacing:0.5px;">${name}</div>
                    <div style="font-size:13px; color:var(--dim); margin-top:6px; font-weight:600;">${last ? last.weight+'kg • '+last.sets.join('/') : '--'}</div>
                    ${statusHtml}
                </div>
                <div style="background:${id==='U1'? 'var(--gradient-red)':'var(--gradient-gold)'}; width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,0.3); color:${id==='U1'?'white':'black'}; font-weight:bold;">+</div>
            `;
            list.appendChild(card);
        });
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        if(last) {
            document.getElementById('last-record-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-record-text').innerText = "Aucune donnée";
            document.getElementById('main-weight').value = "";
            currentSets = [8, 8, 8];
        }
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div class="set-row">
                <span class="oswald" style="color:var(--dim); font-size:12px;">SÉRIE ${i+1}</span>
                <div style="display:flex; align-items:center;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:26px; width:45px; text-align:center;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                    <button class="btn-del-set" onclick="removeSet(${i})">✕</button>
                </div>
            </div>
        `).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(8); refreshSetsUI(); }
    function removeSet(i) { currentSets.splice(i, 1); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function addExo() {
        const n = prompt("Nom de l'exercice :");
        if(n) { config[currentSessId].push(n); saveConfig(); load(currentSessId); }
    }

    function renameExo() {
        const n = prompt("Nouveau nom :", currentExo);
        if(n && n !== currentExo) {
            const idx = config[currentSessId].indexOf(currentExo);
            config[currentSessId][idx] = n;
            logs[n] = logs[currentExo];
            delete logs[currentExo];
            currentExo = n;
            saveConfig();
            document.getElementById('m-name').innerText = n;
            load(currentSessId);
        }
    }

    function deleteExo() {
        if(confirm("Supprimer l'exercice ?")) {
            config[currentSessId] = config[currentSessId].filter(e => e !== currentExo);
            delete logs[currentExo];
            saveConfig();
            closeM();
            load(currentSessId);
        }
    }

    function saveConfig() {
        localStorage.setItem('Elite_VNext_Config', JSON.stringify(config));
        localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
    }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = {
            date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}),
            weight, sets: [...currentSets],
            avgReps: parseFloat((currentSets.reduce((a,b)=>a+b,0) / currentSets.length).toFixed(1))
        };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        saveConfig();
        closeM(); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();
        if(h.length === 0) return;

        const wCol = h.map((e, i) => i === 0 ? '#fff' : (e.weight > h[i-1].weight ? '#00ff88' : e.weight < h[i-1].weight ? '#ff3b3b' : '#fff'));

        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [{
                    data: h.map(l => l.weight),
                    borderColor: '#444', borderWidth: 2,
                    segment: { borderColor: ctx => wCol[ctx.p1DataIndex] },
                    pointBackgroundColor: wCol, pointRadius: 5,
                    datalabels: { color: wCol, align: 'top', font:{family:'Oswald', weight:'bold'}, formatter: (v)=>v+'kg' }
                }]
            },
            options: {
                maintainAspectRatio: false, plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false }, ticks:{color:'#444'} }, y: { display: false } }
            }
        });
    }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div class="history-row">
                <span class="oswald" style="color:var(--accent)">${e.weight} KG</span>
                <span style="font-weight:bold;">${e.sets.join(' / ')}</span>
                <span style="color:var(--red)" onclick="deleteEntry('${name}',${i})">✕</span>
            </div>
        `).reverse().join('');
    }

    function deleteEntry(name, i) { if(confirm("Supprimer ?")) { logs[name].splice(i, 1); saveConfig(); renderHistory(name); renderChart(name); load(currentSessId); } }
   
    load('U1');
</script>
</body>
</html>
