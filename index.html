<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE TRACKER - NEXT GEN DYNAMIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --bg: #050505; --card: #111111; --accent: #ff0000; --accent-dark: #8b0000;
            --gradient: linear-gradient(135deg, #ff1f1f 0%, #8b0000 100%);
            --text: #ffffff; --dim: #888; --green: #00ff88; --red: #ff3b3b; 
            --orange: #ff9500; --magenta: #ff00ff; --glass: rgba(255, 255, 255, 0.03);
        }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-top: 40px;
            background-image: radial-gradient(circle at 50% 0%, #1a0000 0%, #050505 50%);
        }

        h1, h2, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        .header { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-start; }
        .header h1 { font-size: 32px; text-shadow: 0 0 15px rgba(255, 0, 0, 0.3); margin: 0; }
        .header span { color: var(--accent); font-size: 11px; font-weight: 800; }

        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .nav-btn { 
            background: #0f0f0f; border: 1px solid #222; color: var(--dim); padding: 18px; 
            border-radius: 12px; cursor: pointer; font-family: 'Oswald'; font-size: 14px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn.active { 
            background: var(--gradient); color: white; border-color: transparent;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2); transform: translateY(-2px);
        }

        .exo-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08); 
            padding: 20px; border-radius: 16px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
        }

        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 900; margin-top: 8px; display: inline-block; text-transform: uppercase; }
        .badge-up { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); }
        .badge-stay { background: rgba(255, 255, 255, 0.05); color: var(--dim); border: 1px solid #333; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; padding: 25px; overflow-y: auto; }
        
        .record-banner { 
            background: rgba(255,255,255,0.03); border: 1px solid #222; border-left: 4px solid var(--accent);
            padding: 15px; border-radius: 12px; margin-bottom: 20px; 
        }
        .record-banner small { color: var(--dim); font-size: 9px; font-weight: 800; display: block; margin-bottom: 4px; }
        .record-banner div { font-family: 'Oswald'; font-size: 20px; color: #fff; }

        .input-section { 
            background: linear-gradient(180deg, #151515 0%, #0a0a0a 100%); 
            border: 1px solid #222; padding: 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .weight-input { 
            width: 100%; background: transparent; border: none; color: #fff; font-size: 48px; 
            font-family: 'Oswald'; text-align: center; outline: none; margin-bottom: 10px;
        }

        .set-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px;
        }
        .btn-qty { background: #1a1a1a; color: white; border: 1px solid #333; width: 45px; height: 45px; border-radius: 12px; font-size: 20px; }
        
        .btn-save { 
            background: var(--gradient); color: white; border: none; width: 100%; padding: 20px; 
            font-family: 'Oswald'; font-size: 20px; border-radius: 14px; font-weight: bold; margin-top: 25px;
        }

        .chart-box { height: 280px; margin-top: 30px; border-radius: 16px; background: rgba(0,0,0,0.3); padding: 15px; border: 1px solid #111; }
        .history-row { display: flex; justify-content: space-between; padding: 15px; background: var(--glass); border-radius: 12px; margin-bottom: 8px; font-size: 13px; border: 1px solid rgba(255,255,255,0.03); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span>PERFORMANCE ANALYTICS</span>
            <h1 id="title">SESSION 1</h1>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" id="btnU1" onclick="load('U1')">SESSION UPPER 1</button>
        <button class="nav-btn" id="btnU2" onclick="load('U2')">SESSION UPPER 2</button>
    </div>

    <div id="exo-list"></div>

    <div id="modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 id="m-name" style="margin:0; font-size:24px;"></h2>
            <span onclick="closeM()" style="background:#1a1a1a; padding:10px 15px; border-radius:12px; color:var(--accent); font-weight:bold; cursor:pointer;">✕</span>
        </div>

        <div class="record-banner">
            <small>RECORD SEMAINE PASSÉE</small>
            <div id="last-record-text">-- kg | -- reps</div>
        </div>

        <div class="input-section">
            <input type="number" id="main-weight" class="weight-input" inputmode="decimal">
            <div style="text-align:center; color:var(--accent); font-family:Oswald; margin-bottom:20px; font-size:14px;">KILOGRAMMES</div>
            <div id="sets-container"></div>
            <button onclick="addNewSet()" style="width:100%; background:none; border:1px dashed #444; color:#666; padding:12px; margin-top:15px; border-radius:12px; font-size:11px;">+ AJOUTER UNE SÉRIE</button>
        </div>

        <button class="btn-save" onclick="saveSession()">ENREGISTRER LA PERFORMANCE</button>
        
        <div class="chart-box"><canvas id="chart"></canvas></div>

        <div id="history-list" style="margin-top:30px;"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);

    let config = JSON.parse(localStorage.getItem('Elite_VNext_Config')) || {
        'U1': ["Développé couché", "Tirage vertical prise serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };
    let logs = JSON.parse(localStorage.getItem('Elite_VNext_Logs')) || {};
    let currentExo = ""; let currentSets = []; let currentSessId = 'U1'; let chartObj = null;

    function load(id) {
        currentSessId = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+id).classList.add('active');
        document.getElementById('title').innerText = id === 'U1' ? 'UPPER 1' : 'UPPER 2';
        
        const list = document.getElementById('exo-list');
        list.innerHTML = '';
        config[id].forEach(name => {
            const h = logs[name] || []; const last = h.length > 0 ? h[h.length-1] : null;
            let statusHtml = '<span class="status-badge badge-stay">VISER 10 REPS</span>';
            if(last && last.sets.every(r => r >= 10)) statusHtml = '<span class="status-badge badge-up">AUGMENTE TA CHARGE</span>';

            const card = document.createElement('div');
            card.className = 'exo-card';
            card.onclick = () => openM(name);
            card.innerHTML = `
                <div>
                    <div class="oswald" style="font-size:18px;">${name}</div>
                    <div style="font-size:12px; color:var(--dim); margin-top:4px;">${last ? last.weight+'kg • '+last.sets.join('/') : '--'}</div>
                    ${statusHtml}
                </div>
                <div style="background:var(--gradient); width:35px; height:35px; border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow:0 5px 15px rgba(255,0,0,0.2)">+</div>
            `;
            list.appendChild(card);
        });
    }

    function openM(name) {
        currentExo = name; const h = logs[name] || [];
        const last = h.length > 0 ? h[h.length-1] : null;
        if(last) {
            document.getElementById('last-record-text').innerText = `${last.weight} kg | ${last.sets.join(' / ')} reps`;
            document.getElementById('main-weight').value = last.weight;
            currentSets = [...last.sets];
        } else {
            document.getElementById('last-record-text').innerText = "Aucun record";
            document.getElementById('main-weight').value = "";
            currentSets = [8, 8, 8];
        }
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-name').innerText = name;
        refreshSetsUI(); renderChart(name); renderHistory(name);
    }

    function refreshSetsUI() {
        const container = document.getElementById('sets-container');
        container.innerHTML = currentSets.map((reps, i) => `
            <div class="set-row">
                <span class="oswald" style="color:var(--dim); font-size:12px;">SÉRIE ${i+1}</span>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="btn-qty" onclick="changeRep(${i},-1)">-</button>
                    <span class="oswald" style="font-size:24px; width:30px; text-align:center;">${reps}</span>
                    <button class="btn-qty" onclick="changeRep(${i},1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function changeRep(i, v) { currentSets[i] = Math.max(0, currentSets[i] + v); refreshSetsUI(); }
    function addNewSet() { currentSets.push(8); refreshSetsUI(); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function saveSession() {
        const weight = parseFloat(document.getElementById('main-weight').value);
        if(isNaN(weight)) return;
        const entry = { 
            date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}), 
            weight, sets: [...currentSets],
            avgReps: parseFloat((currentSets.reduce((a,b)=>a+b,0) / currentSets.length).toFixed(1))
        };
        if(!logs[currentExo]) logs[currentExo] = [];
        logs[currentExo].push(entry);
        localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs));
        closeM(); load(currentSessId);
    }

    function renderChart(name) {
        const h = logs[name] || []; const ctx = document.getElementById('chart').getContext('2d');
        if(chartObj) chartObj.destroy();

        const wCol = h.map((e, i) => i === 0 ? '#fff' : (e.weight > h[i-1].weight ? '#00ff88' : e.weight < h[i-1].weight ? '#ff3b3b' : '#fff'));
        const rCol = h.map((e, i) => i === 0 ? '#fff' : (e.avgReps > h[i-1].avgReps ? '#ff00ff' : e.avgReps < h[i-1].avgReps ? '#ff9500' : '#fff'));

        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: h.map(l => l.date),
                datasets: [
                    {
                        data: h.map(l => l.weight),
                        borderColor: '#444', borderWidth: 2,
                        segment: { borderColor: ctx => wCol[ctx.p1DataIndex] },
                        pointBackgroundColor: wCol, pointRadius: 5,
                        datalabels: { color: wCol, align: 'top', font:{family:'Oswald', weight:'bold'}, formatter: (v)=>v+'kg' }
                    },
                    {
                        data: h.map(l => l.avgReps),
                        borderColor: '#222', borderDash: [5, 5],
                        segment: { borderColor: ctx => rCol[ctx.p1DataIndex] },
                        pointBackgroundColor: rCol, pointRadius: 3,
                        datalabels: { color: rCol, align: 'bottom', font:{size:10}, formatter: (v)=>v+'r' }
                    }
                ]
            },
            options: { 
                maintainAspectRatio: false, plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false }, ticks:{color:'#444'} }, y: { display: false } }
            }
        });
    }

    function renderHistory(name) {
        const h = logs[name] || [];
        document.getElementById('history-list').innerHTML = h.map((e, i) => `
            <div class="history-row">
                <span class="oswald" style="color:var(--accent)">${e.weight} KG</span>
                <span style="font-weight:bold;">${e.sets.join(' / ')}</span>
                <span style="color:var(--red)" onclick="deleteEntry('${name}',${i})">✕</span>
            </div>
        `).reverse().join('');
    }

    function deleteEntry(name, i) { if(confirm("Supprimer ?")) { logs[name].splice(i, 1); localStorage.setItem('Elite_VNext_Logs', JSON.stringify(logs)); renderHistory(name); renderChart(name); load(currentSessId); } }
    load('U1');
</script>
</body>
</html>
