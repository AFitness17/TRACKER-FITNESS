<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Tracker - Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #0c0c0c; --accent: #e61e25; 
            --gold: #d4af37; --green: #2ecc71; --text: #ffffff; --dim: #666;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h1, h2, .title-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-title { border-left: 4px solid var(--accent); padding-left: 12px; }
        .header-title span { color: var(--dim); font-size: 10px; letter-spacing: 2px; display: block; }
        .header-title h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }

        /* Dashboard de stats style Image 1000059268 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #1a1a1a; border: 1px solid #1a1a1a; margin-bottom: 25px; }
        .stat-item { background: var(--card); padding: 15px; }
        .stat-label { color: var(--dim); font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-value { font-family: 'Oswald', sans-serif; font-size: 20px; }
        .stat-sub { color: var(--dim); font-size: 11px; margin-top: 4px; }

        /* Navigation Séances */
        .nav-sessions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .btn-nav { background: var(--card); border: 1px solid #222; color: var(--dim); padding: 15px; border-radius: 4px; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 14px; }
        .btn-nav.active { background: #1a0505; border-color: var(--accent); color: white; }

        /* Cartes Exercices */
        .exo-card { background: var(--card); border-bottom: 1px solid #1a1a1a; padding: 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .exo-info { flex-grow: 1; }
        .exo-name { font-family: 'Oswald', sans-serif; font-size: 18px; margin-bottom: 5px; }
        .exo-meta { color: var(--dim); font-size: 12px; }

        .btn-add-record { background: #1a1a1a; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* Fenêtre Saisie (Overlay) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 500px; margin: 0 auto; }
        .close { color: var(--accent); font-family: 'Oswald'; cursor: pointer; float: right; font-size: 18px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .input-box { background: #111; border: 1px solid #222; padding: 10px; text-align: center; border-radius: 8px; }
        .input-box label { display: block; color: var(--dim); font-size: 10px; margin-bottom: 5px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-size: 18px; font-weight: bold; }

        .btn-confirm { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; font-family: 'Oswald'; font-size: 18px; border-radius: 4px; cursor: pointer; }

        /* Graphique */
        .chart-wrap { height: 200px; margin: 20px 0; background: #080808; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            <span>OUTIL 01</span>
            <h1>MES PERFORMANCES</h1>
        </div>
        <div style="background: var(--accent); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold;">+</div>
    </div>

    <div class="dashboard">
        <div class="stat-item">
            <div class="stat-label">PR Développé Couché</div>
            <div class="stat-value" id="pr-dc">--</div>
            <div class="stat-sub">1RM estimé</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">PR Tirage</div>
            <div class="stat-value" id="pr-tirage">--</div>
            <div class="stat-sub">1RM estimé</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Entrées Totales</div>
            <div class="stat-value" id="total-entries">0</div>
            <div class="stat-sub">performances</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Meilleur Progrès</div>
            <div class="stat-value" style="color: var(--green);">+0%</div>
            <div class="stat-sub">vs séance précédente</div>
        </div>
    </div>

    <div class="nav-sessions">
        <button class="btn-nav active" onclick="switchSession('U1')">UPPER 1</button>
        <button class="btn-nav" onclick="switchSession('U2')">UPPER 2</button>
    </div>

    <div id="exo-list"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">FERMER ✕</span>
            <h2 id="modal-title" style="font-size: 24px; margin-top: 40px;"></h2>
            
            <div class="chart-wrap"><canvas id="perfChart"></canvas></div>

            <div class="input-grid">
                <div class="input-box"><label>SÉRIES</label><input type="number" id="in-s" placeholder="3"></div>
                <div class="input-box"><label>POIDS (KG)</label><input type="number" id="in-w" placeholder="80"></div>
                <div class="input-box"><label>REPS</label><input type="number" id="in-r" placeholder="10"></div>
            </div>
            <button class="btn-confirm" onclick="savePerf()">ENREGISTRER LA SÉANCE</button>
            
            <div id="history-list" style="margin-top: 20px; font-size: 13px;"></div>
        </div>
    </div>

<script>
    const sessions = {
        'U1': ["Développé couché", "Tirage vertical serré", "Tirage horizontal", "Elevations latérales", "Curl marteau"],
        'U2': ["Développé couché barre", "Tirage horizontal", "Tirage vertical", "Face pull", "Elevation latérale"]
    };

    let logs = JSON.parse(localStorage.getItem('muscuEliteLogs')) || {};
    let activeExo = "";
    let chartObj = null;

    function switchSession(id) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const list = document.getElementById('exo-list');
        list.innerHTML = '';

        sessions[id].forEach(name => {
            const hist = logs[name] || [];
            const last = hist.length > 0 ? hist[hist.length-1] : {weight:'--', reps:'--', sets:'--'};
            const card = document.createElement('div');
            card.className = 'exo-card';
            card.innerHTML = `
                <div class="exo-info" onclick="openModal('${name}')">
                    <div class="exo-name">${name}</div>
                    <div class="exo-meta">${last.sets}x ${last.weight}kg @ ${last.reps} reps</div>
                </div>
                <button class="btn-add-record" onclick="openModal('${name}')">+</button>
            `;
            list.appendChild(card);
        });
        updateDashboard();
    }

    function openModal(name) {
        activeExo = name;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modal-title').innerText = name;
        renderChart(name);
        renderHistory(name);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function savePerf() {
        const s = document.getElementById('in-s').value;
        const w = document.getElementById('in-w').value;
        const r = document.getElementById('in-r').value;
        if(!s || !w || !r) return alert("Remplis tout !");

        const rm = parseFloat((w * (1 + r / 30)).toFixed(1));
